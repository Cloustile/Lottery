name: Deploy to Server

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.FirstKey }}

    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -H 139.196.201.114 >> ~/.ssh/known_hosts

    - name: Deploy to server
      env:
        SERVER_IP: 139.196.201.114
        SERVER_USER: root
        DEPLOY_PATH: /home/admin/nginx-1.29.3/Lottery
      run: |
        echo "🚀 Starting deployment to server..."
        
        # 同步文件到服务器
        rsync -avz --delete \
          --exclude='.git/' \
          --exclude='__pycache__/' \
          --exclude='*.pyc' \
          --exclude='.vercel/' \
          --exclude='node_modules/' \
          --exclude='.env' \
          --exclude='.github/' \
          --exclude='*.md' \
          --exclude='deploy-vercel.bat' \
          --exclude='start.bat' \
          --exclude='start.sh' \
          --exclude='Python-3.8.12/' \
          --exclude='Python-3.8.12.tgz' \
          --exclude='nginx.conf' \
          --exclude='lottery.service' \
          --exclude='lottery_data.json' \
          ./ ${{ env.SERVER_USER }}@${{ env.SERVER_IP }}:${{ env.DEPLOY_PATH }}/
        
        echo "✅ Files synced to server"
        
        # 在服务器上执行部署
        ssh ${{ env.SERVER_USER }}@${{ env.SERVER_IP }} << 'EOF'
          cd $DEPLOY_PATH
          
          echo "📦 Step 1: Installing dependencies..."
          pip3 install -r requirements.txt
          
          echo "🔄 Step 2: Restarting service..."
          
          # 重启 systemd 服务
          echo "Using systemd service..."
          systemctl restart lottery.service
          sleep 3
          
          if systemctl is-active --quiet lottery.service; then
            echo "✅ Service restarted successfully via systemd"
            systemctl status lottery.service --no-pager -l
          else
            echo "❌ Service failed to start"
            journalctl -u lottery.service --no-pager -n 50
            exit 1
          fi
        EOF
        
        echo "🎉 Deployment completed successfully!"
        echo "🌐 Access your application at: http://139.196.201.114"
