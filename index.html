<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运大抽奖 / Lucky Draw</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SimSun', 'Times New Roman', serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #d32f2f;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .login-form, .draw-section, .result-section {
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        input[type="text"],
        input[type="tel"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #d32f2f;
        }

        .btn {
            background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(211, 47, 47, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .prize-display {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 40px;
            border-radius: 15px;
            margin: 30px 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .prize-name {
            font-size: 48px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .hidden {
            display: none;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1> 幸运抽奖 / Lottery </h1>

        <!-- 登录表单 -->
        <div id="loginSection" class="login-form">
            <div class="form-group">
                <label for="idCard">身份证号 / ID Number</label>
                <input type="text" id="idCard" placeholder=" ">
            </div>
            <div class="form-group">
                <label for="name">姓名 / Name</label>
                <input type="text" id="name" placeholder=" ">
            </div>
            <button class="btn" onclick="login()">开始抽奖 / Start Draw</button>

            <div id="loginMessage" class="message"></div>
        </div>

        <!-- 抽奖结果区域 -->
        <div id="drawResult" class="result-section hidden">
            <div class="prize-display">
                <div class="prize-name" id="prizeName">???</div>
            </div>
            <p id="congratulations" style="font-size: 20px; color: #333; margin-top: 20px;"></p>
            
            
        </div>
    </div>

    <script>
        // 显示消息
        function showMessage(msg, type) {
            const messageEl = document.getElementById('loginMessage');
            messageEl.textContent = msg;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';

            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 3000);
        }

        // 身份证号登录并直接抽奖
        async function login() {
            const idCard = document.getElementById('idCard').value.trim();
            const name = document.getElementById('name').value.trim();

            if (!idCard) {
                showMessage('请输入证件号码 / Please enter your ID number', 'error');
                return;
            }

            if (!name) {
                showMessage('请输入姓名 / Please enter your name', 'error');
                return;
            }

            try {
                // 先登录
                const loginResponse = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        identifier: idCard,
                        name: name
                    })
                });

                const loginResult = await loginResponse.json();
                
                if (!loginResult.success) {
                    showMessage(loginResult.message, 'error');
                    return;
                }
                
                // 检查是否已抽奖
                if (loginResult.has_drawn) {
                    // 显示已抽奖结果
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('drawResult').classList.remove('hidden');
                    document.getElementById('prizeName').textContent = loginResult.prize || '未知奖项 / Unknown Prize';
                    
                    return;
                }
                
                // 直接执行抽奖
                const drawResponse = await fetch('/api/draw', {
                    method: 'POST'
                });

                const drawResult = await drawResponse.json();
                
                // 显示抽奖结果
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('drawResult').classList.remove('hidden');
                
                if (drawResult.success) {
                    document.getElementById('prizeName').textContent = drawResult.prize;
                    document.getElementById('congratulations').textContent = ` 恭喜您获得${drawResult.prize}！/ Congratulations! `;
                } else {
                    document.getElementById('prizeName').textContent = '未中奖 / No Prize';
                    document.getElementById('congratulations').textContent = drawResult.message || '很遗憾，未能抽中奖项 / Unfortunately, no prize was won';
                }
            } catch (error) {
                showMessage('网络错误，请稍后再试 / Network error, please try again later', 'error');
            }
        }
    </script>
</body>
</html>
