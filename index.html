<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幸运大抽奖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 32px;
        }

        .login-form, .draw-section, .result-section {
            margin-top: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        input[type="text"],
        input[type="tel"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .prize-display {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 40px;
            border-radius: 15px;
            margin: 30px 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .prize-name {
            font-size: 48px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .hidden {
            display: none;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 幸运大抽奖 🎉</h1>

        <!-- 登录表单 -->
        <div id="loginSection" class="login-form">
            <div class="form-group">
                <label for="idCard">请输入身份证号（18 位）</label>
                <input type="text" id="idCard" placeholder="请输入 18 位身份证号码" maxlength="18">
            </div>
            <div class="form-group">
                <label for="name">姓名</label>
                <input type="text" id="name" placeholder="请输入您的姓名">
            </div>
            <button class="btn" onclick="login()">登录并抽奖</button>

            <div id="loginMessage" class="message"></div>
            
            <!-- 测试用例提示 -->
            <div style="margin-top: 30px; padding: 15px; background: #fff3cd; border-radius: 8px; text-align: left; border: 2px solid #ffc107;">
                <h4 style="color: #856404; margin-bottom: 10px;">⚠️ 重要提示：</h4>
                <p style="color: #856404; font-size: 14px; line-height: 1.6;">
                    <strong>首次参与？</strong>请联系管理员录入您的信息。<br>
                    <strong>测试用户：</strong>可直接使用以下账号（已预录入）：
                </p>
                <ul style="list-style: none; color: #666; font-size: 14px; margin-top: 10px;">
                    <li>✅ 张三，123456789012345678</li>
                    <li>✅ John Smith，A123456789</li>
                    <li>✅ 李四，110105199001011234</li>
                    <li>✅ Maria Garcia，X987654321</li>
                    <li>✅ 王五，310101198512121234</li>
                </ul>
            </div>
        </div>

        <!-- 抽奖结果区域 -->
        <div id="drawResult" class="result-section hidden">
            <div class="prize-display">
                <div class="prize-name" id="prizeName">???</div>
            </div>
            <p id="congratulations" style="font-size: 20px; color: #333; margin-top: 20px;"></p>
            
            <button class="btn" onclick="location.reload()" style="margin-top: 20px;">🔄 返回重新登录</button>
        </div>
    </div>

    <script>
        // 显示消息
        function showMessage(msg, type) {
            const messageEl = document.getElementById('loginMessage');
            messageEl.textContent = msg;
            messageEl.className = `message ${type}`;
            messageEl.style.display = 'block';

            setTimeout(() => {
                messageEl.style.display = 'none';
            }, 3000);
        }

        // 身份证号登录并直接抽奖
        async function login() {
            const idCard = document.getElementById('idCard').value.trim();
            const name = document.getElementById('name').value.trim();

            if (!idCard) {
                showMessage('请输入证件号码', 'error');
                return;
            }

            if (!name) {
                showMessage('请输入姓名', 'error');
                return;
            }

            try {
                // 先登录
                const loginResponse = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        identifier: idCard,
                        name: name
                    })
                });

                const loginResult = await loginResponse.json();
                
                if (!loginResult.success) {
                    showMessage(loginResult.message, 'error');
                    return;
                }
                
                // 检查是否已抽奖
                if (loginResult.has_drawn) {
                    // 显示已抽奖结果
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('drawResult').classList.remove('hidden');
                    document.getElementById('prizeName').textContent = loginResult.prize || '未知奖项';
                    document.getElementById('congratulations').textContent = `您之前获得的奖项：${loginResult.prize}`;
                    return;
                }
                
                // 直接执行抽奖
                const drawResponse = await fetch('/api/draw', {
                    method: 'POST'
                });

                const drawResult = await drawResponse.json();
                
                // 显示抽奖结果
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('drawResult').classList.remove('hidden');
                
                if (drawResult.success) {
                    document.getElementById('prizeName').textContent = drawResult.prize;
                    document.getElementById('congratulations').textContent = `🎉 恭喜您获得${drawResult.prize}！🎉`;
                } else {
                    document.getElementById('prizeName').textContent = '未中奖';
                    document.getElementById('congratulations').textContent = drawResult.message || '很遗憾，未能抽中奖项';
                }
            } catch (error) {
                showMessage('网络错误，请稍后再试', 'error');
            }
        }
    </script>
</body>
</html>
